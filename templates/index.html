<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupportMate AI – Customer Support</title>
    <meta name="description" content="SupportMate AI – Instant AI-powered customer support, available 24/7." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <!-- Animated background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <div class="avatar-wrapper">
                    <div class="avatar">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" fill="white"/>
                        </svg>
                    </div>
                    <span class="status-dot" id="statusDot"></span>
                </div>
                <div class="header-info">
                    <h1 class="brand-name">SupportMate AI</h1>
                    <p class="brand-status" id="statusText">Connecting...</p>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="clearBtn" title="Clear conversation">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3,6 5,6 21,6"></polyline>
                        <path d="M19,6l-1,14H6L5,6"></path>
                        <path d="M10,11v6M14,11v6"></path>
                        <path d="M9,6V4h6v2"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Chat window -->
        <main class="chat-window" id="chatWindow" role="log" aria-live="polite" aria-label="Chat messages">
            <!-- Welcome message -->
            <div class="welcome-card" id="welcomeCard">
                <div class="welcome-icon">👋</div>
                <h2>Welcome to SupportMate AI</h2>
                <p>I'm your AI-powered customer support assistant. Ask me anything — I'm here to help!</p>
                <div class="suggestion-chips">
                    <button class="chip" data-msg="How can I track my order?">📦 Track my order</button>
                    <button class="chip" data-msg="I need help with billing.">💳 Billing help</button>
                    <button class="chip" data-msg="How do I reset my password?">🔐 Reset password</button>
                    <button class="chip" data-msg="I want to return a product.">↩️ Return a product</button>
                </div>
            </div>
        </main>

        <!-- Input area -->
        <footer class="chat-footer">
            <div class="input-wrapper">
                <textarea
                    id="userInput"
                    placeholder="Type your message here…"
                    rows="1"
                    aria-label="Message input"
                    autocomplete="off"
                    spellcheck="true"
                ></textarea>
                <button id="sendBtn" class="send-btn" aria-label="Send message" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <p class="footer-note">SupportMate AI may make mistakes. For urgent issues, contact our human team.</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
